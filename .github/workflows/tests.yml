name: CI tests

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

jobs:
  tests:
    if: ${{ !contains(github.actor, '[bot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test
